<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bg_agentic" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow_agentic">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg_agentic)" />

  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="100" y1="150" x2="300" y2="80" />
    <line x1="300" y1="80" x2="600" y2="150" />
    <line x1="600" y1="150" x2="700" y2="350" />
    <line x1="700" y1="350" x2="500" y2="500" />
    <line x1="500" y1="500" x2="200" y2="450" />
    <line x1="200" y1="450" x2="100" y2="150" />
    <line x1="300" y1="80" x2="500" y2="500" />
    <line x1="200" y1="450" x2="600" y2="150" />
  </g>
  
  <circle cx="100" cy="150" r="4" fill="#a855f7" filter="url(#glow_agentic)" />
  <circle cx="300" cy="80" r="6" fill="#3b82f6" filter="url(#glow_agentic)" />
  <circle cx="600" cy="150" r="5" fill="#06b6d4" filter="url(#glow_agentic)" />
  <circle cx="700" cy="350" r="7" fill="#a855f7" filter="url(#glow_agentic)" />
  <circle cx="500" cy="500" r="6" fill="#3b82f6" filter="url(#glow_agentic)" />
  <circle cx="200" cy="450" r="5" fill="#06b6d4" filter="url(#glow_agentic)" />
  
  <text x="40" y="50" fill="#fff" font-family="sans-serif" font-size="20" font-weight="bold">Agentia World.</text>
  <text x="500" y="50" fill="#cbd5e1" font-family="sans-serif" font-size="14">Platform</text>
  <text x="580" y="50" fill="#cbd5e1" font-family="sans-serif" font-size="14">Solutions</text>
  <text x="670" y="50" fill="#cbd5e1" font-family="sans-serif" font-size="14">Pricing</text>
  <rect x="730" y="32" width="40" height="26" rx="6" fill="rgba(255,255,255,0.1)" />
  <text x="740" y="49" fill="#fff" font-family="sans-serif" font-size="12">Hub</text>

  <text x="400" y="240" fill="url(#textGrad)" font-family="sans-serif" font-size="64" font-weight="bold" text-anchor="middle" filter="url(#glow_agentic)">Welcome to Agentia</text>
  <text x="400" y="300" fill="#fff" font-family="sans-serif" font-size="56" font-weight="bold" text-anchor="middle">The AI Native Future.</text>
  
  <text x="400" y="350" fill="#94a3b8" font-family="sans-serif" font-size="18" text-anchor="middle">Step into the future of digital experiences where intelligent autonomous</text>
  <text x="400" y="380" fill="#94a3b8" font-family="sans-serif" font-size="18" text-anchor="middle">agents drive innovation and imagination seamlessly.</text>
  
  <rect x="310" y="430" width="180" height="50" rx="25" fill="none" stroke="url(#textGrad)" stroke-width="2" filter="url(#glow_agentic)" />
  <text x="400" y="460" fill="#fff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Explore Solutions</text>

  <rect x="180" y="540" width="440" height="80" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="400" y="585" fill="#e2e8f0" font-family="sans-serif" font-size="14" text-anchor="middle">Trusted by forward-thinking enterprises globally</text>
</svg>
