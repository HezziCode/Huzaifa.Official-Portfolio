<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg_crypto" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </linearGradient>
    <filter id="glow_neon">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg_crypto)" />
  
  <path d="M 0 100 L 800 100 M 0 200 L 800 200 M 0 300 L 800 300 M 0 400 L 800 400 M 0 500 L 800 500" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  
  <text x="40" y="50" fill="#fff" font-family="sans-serif" font-size="24" font-weight="bold">Crypto Agent</text>
  <text x="680" y="50" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold">● LIVE</text>
  
  <line x1="40" y1="70" x2="760" y2="70" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <rect x="40" y="100" width="460" height="280" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <text x="60" y="140" fill="#9ca3af" font-family="sans-serif" font-size="14">Bitcoin (BTC) / USD</text>
  <text x="60" y="180" fill="#fff" font-family="sans-serif" font-size="36" font-weight="bold">$ 64,230.50</text>
  <text x="260" y="175" fill="#10b981" font-family="sans-serif" font-size="18" font-weight="bold" filter="url(#glow_neon)">+ 4.2%</text>
  
  <path d="M 40 380 Q 100 380 150 320 T 250 280 T 350 200 T 450 160 T 500 120 L 500 380 Z" fill="url(#chartFill)" />
  <path d="M 40 380 Q 100 380 150 320 T 250 280 T 350 200 T 450 160 T 500 120" fill="none" stroke="url(#chartLine)" stroke-width="4" filter="url(#glow_neon)" />
  <circle cx="500" cy="120" r="6" fill="#fff" filter="url(#glow_neon)" />
  
  <rect x="520" y="100" width="240" height="130" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <text x="540" y="130" fill="#9ca3af" font-family="sans-serif" font-size="14">Ethereum (ETH)</text>
  <text x="540" y="165" fill="#fff" font-family="sans-serif" font-size="24" font-weight="bold">$ 3,450.20</text>
  <text x="540" y="195" fill="#f43f5e" font-family="sans-serif" font-size="14" font-weight="bold">- 1.2%</text>
  
  <rect x="520" y="250" width="240" height="130" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <text x="540" y="280" fill="#9ca3af" font-family="sans-serif" font-size="14">Solana (SOL)</text>
  <text x="540" y="315" fill="#fff" font-family="sans-serif" font-size="24" font-weight="bold">$ 145.80</text>
  <text x="540" y="345" fill="#10b981" font-family="sans-serif" font-size="14" font-weight="bold">+ 8.4%</text>
  
  <rect x="40" y="410" width="720" height="150" rx="16" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <circle cx="80" cy="450" r="20" fill="#eab308" />
  <text x="120" y="445" fill="#fff" font-family="sans-serif" font-size="16" font-weight="bold">Crypto Agent</text>
  <text x="120" y="470" fill="#d1d5db" font-family="sans-serif" font-size="14">BTC breached the descending resistance. Next major resistance is at $65,500.</text>
  
  <rect x="120" y="500" width="600" height="40" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <text x="140" y="525" fill="#6b7280" font-family="sans-serif" font-size="14">Ask the agent about trends or market summary...</text>
</svg>
