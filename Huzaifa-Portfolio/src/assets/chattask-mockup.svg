  <rect x="40" y="100" width="160" height="40" rx="8" fill="url(#primary)" />
  <text x="60" y="125" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">+ New Task</text>
  
  <rect x="40" y="160" width="160" height="30" rx="6" fill="rgba(255,255,255,0.1)" />
  <rect x="40" y="200" width="160" height="30" rx="6" fill="rgba(255,255,255,0.05)" />
  <rect x="40" y="240" width="140" height="30" rx="6" fill="rgba(255,255,255,0.05)" />
  
  <rect x="240" y="20" width="540" height="560" rx="16" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  
  <text x="280" y="70" fill="#fff" font-family="sans-serif" font-size="28" font-weight="bold">Project Alpha Launch</text>
  <text x="280" y="95" fill="#94a3b8" font-family="sans-serif" font-size="14">3 participants • Last active 2m ago</text>
  
  <line x1="240" y1="120" x2="780" y2="120" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <rect x="280" y="150" width="300" height="60" rx="12" fill="rgba(255,255,255,0.08)" />
  <circle cx="260" cy="180" r="16" fill="#3b82f6" />
  <rect x="300" y="170" width="200" height="8" rx="4" fill="#94a3b8" />
  <rect x="300" y="186" width="150" height="8" rx="4" fill="#94a3b8" />
  
  <rect x="440" y="240" width="300" height="80" rx="12" fill="url(#primary)" filter="url(#glow)" />
  <circle cx="760" cy="280" r="16" fill="#06b6d4" />
  <rect x="460" y="260" width="240" height="8" rx="4" fill="#fff" />
  <rect x="460" y="278" width="190" height="8" rx="4" fill="#fff" />
  <rect x="460" y="296" width="120" height="8" rx="4" fill="#fff" />
  
  <rect x="280" y="350" width="350" height="100" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(6, 182, 212, 0.5)" stroke-width="1" />
  <circle cx="310" cy="380" r="10" stroke="#06b6d4" stroke-width="2" fill="none" />
  <text x="335" y="385" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="bold">Update Landing Page Copy</text>
